# =============================================================================
# Billing Automation API — versão FREE TIER (1 instância, ~1 GiB + swap)
#
# Diferente do docker-compose.yml (Swarm): este é para `docker compose up`
# num único host, com 1 réplica de cada, limites de memória enxutos e ordem
# de inicialização garantida por depends_on (o migrate roda ANTES da API/worker).
#
# Uso (dentro da EC2):
#   set -a; . ./.env; set +a
#   docker compose -f docker-compose.free.yml up -d --build
#   docker compose -f docker-compose.free.yml ps
#   docker compose -f docker-compose.free.yml logs -f api
#
# Segredos vêm do .env (nunca versionado). Ver .env.example.
# Orçamento aproximado de RAM: pg 256 + rabbit 350 + redis 96 + api 256 +
# worker 256 + front 64 ≈ 1.3 GiB de teto (picos vão para a swap).
# =============================================================================

x-app-env: &app-env
  NODE_ENV: production
  DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}@postgres:5432/${POSTGRES_DB:-billing_db}
  RABBITMQ_URL: amqp://${RABBITMQ_USER:-billing}:${RABBITMQ_PASSWORD:?defina RABBITMQ_PASSWORD no .env}@rabbitmq:5672
  REDIS_ENABLED: "true"
  REDIS_URL: redis://redis:6379

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "3"

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-billing_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [billing-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-billing_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    restart: unless-stopped
    logging: *default-logging

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-billing}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?defina RABBITMQ_PASSWORD no .env}
    ports:
      - "15672:15672" # painel (proteja no Security Group da AWS)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks: [billing-network]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    mem_limit: 350m
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    networks: [billing-network]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    mem_limit: 96m
    restart: unless-stopped
    logging: *default-logging

  # Migrações: roda uma vez, aplica o schema e sai. A API/worker só sobem depois.
  migrate:
    build: .
    image: billing-api:latest
    command: ["npx", "prisma", "migrate", "deploy"]
    env_file: [.env]
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
    networks: [billing-network]
    mem_limit: 256m
    restart: "no"
    logging: *default-logging

  api:
    image: billing-api:latest
    env_file: [.env]
    environment:
      <<: *app-env
      RUN_WORKER_INLINE: "false" # worker roda em serviço próprio (D-03)
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [billing-network]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    stop_grace_period: 30s
    mem_limit: 256m
    restart: unless-stopped
    logging: *default-logging

  worker:
    image: billing-api:latest
    command: ["node", "dist/worker.js"]
    env_file: [.env]
    environment:
      <<: *app-env
    depends_on:
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [billing-network]
    stop_grace_period: 30s
    mem_limit: 256m
    restart: unless-stopped
    logging: *default-logging

  # ==========================================================================
  # FRONTEND (descomente quando existir). nginx serve o estático e faz proxy
  # de /api -> api:3000, virando o ponto de entrada na porta 80.
  # Precisa de: ./frontend/dist (build do front) e ./frontend/nginx.conf.
  # Com ele ativo, você pode remover o "ports: 3000:3000" da API (fica interna).
  # ==========================================================================
  # web:
  #   image: nginx:1.27-alpine
  #   depends_on:
  #     api:
  #       condition: service_started
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./frontend/dist:/usr/share/nginx/html:ro
  #     - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #   networks: [billing-network]
  #   mem_limit: 64m
  #   restart: unless-stopped
  #   logging: *default-logging

networks:
  billing-network:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
