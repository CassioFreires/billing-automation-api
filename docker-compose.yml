version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: billing_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - billing-network
    deploy:
      restart_policy:
        condition: on-failure

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: cassio
      RABBITMQ_DEFAULT_PASS: MinhaSenha123
    ports:
      - "15672:15672"
      - "5672:5672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - billing-network
    deploy:
      restart_policy:
        condition: on-failure

  api:
    image: billing-api:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/billing_db
      RABBITMQ_URL: amqp://cassio:MinhaSenha123@rabbitmq:5672
      NODE_ENV: production
    networks:
      - billing-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  billing-network:
    driver: overlay

volumes:
  postgres_data:
  rabbitmq_data: