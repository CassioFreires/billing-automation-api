# =============================================================================
# Billing Automation API — Docker Swarm stack
#
# Deploy:
#   1. Build/push da imagem:  docker build -t $API_IMAGE .   (push p/ ECR se multi-node)
#   2. Carregue as variáveis:  set -a; . ./.env; set +a
#   3. Migre o banco:          docker stack deploy -c docker-compose.yml billing
#                              (o serviço `migrate` roda uma vez e sai)
#   4. Confira:                docker service ls
#
# Segredos/credenciais NUNCA ficam neste arquivo — vêm do .env (ver .env.example).
# Para produção mais rígida, migre POSTGRES_PASSWORD/RABBITMQ_PASSWORD/JWT_SECRET/
# WEBHOOK_SECRET para `docker secret` (requer ler de /run/secrets via entrypoint).
# =============================================================================

x-app-env: &app-env
  NODE_ENV: production
  DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}@postgres:5432/${POSTGRES_DB:-billing_db}
  RABBITMQ_URL: amqp://${RABBITMQ_USER:-billing}:${RABBITMQ_PASSWORD:?defina RABBITMQ_PASSWORD no .env}@rabbitmq:5672
  REDIS_ENABLED: "true"
  REDIS_URL: redis://redis:6379

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-billing_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [billing-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-billing_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    deploy:
      restart_policy:
        condition: on-failure

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-billing}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?defina RABBITMQ_PASSWORD no .env}
    ports:
      - "15672:15672" # painel de gestão (5672 fica interno à rede overlay)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks: [billing-network]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    logging: *default-logging
    deploy:
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    networks: [billing-network]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging
    deploy:
      restart_policy:
        condition: on-failure

  # Migrações do banco. Roda uma vez e sai — execute ANTES de servir tráfego.
  migrate:
    image: ${API_IMAGE:-billing-api:latest}
    command: ["npx", "prisma", "migrate", "deploy"]
    env_file: [.env]
    environment:
      <<: *app-env
    networks: [billing-network]
    logging: *default-logging
    deploy:
      replicas: 1
      restart_policy:
        condition: none

  api:
    image: ${API_IMAGE:-billing-api:latest}
    env_file: [.env]
    environment:
      <<: *app-env
      RUN_WORKER_INLINE: "false" # worker roda em serviço próprio (evita consumidor duplicado — D-03)
    ports:
      - "3000:3000"
    networks: [billing-network]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    stop_grace_period: 30s
    logging: *default-logging
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  worker:
    image: ${API_IMAGE:-billing-api:latest}
    command: ["node", "dist/worker.js"]
    env_file: [.env]
    environment:
      <<: *app-env
    # Worker não é serviço HTTP: desabilita o HEALTHCHECK herdado do Dockerfile
    # (que testa /api/health), senão fica "unhealthy" à toa.
    healthcheck:
      disable: true
    networks: [billing-network]
    stop_grace_period: 30s
    logging: *default-logging
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

networks:
  billing-network:
    driver: overlay

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
