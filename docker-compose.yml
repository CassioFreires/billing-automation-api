version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: billing_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - billing-network
    deploy:
      restart_policy:
        condition: on-failure

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: cassio
      RABBITMQ_DEFAULT_PASS: MinhaSenha123
    ports:
      - "15672:15672"
      - "5672:5672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - billing-network
    deploy:
      restart_policy:
        condition: on-failure

  api:
    image: billing-api:latest
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/billing_db
      RABBITMQ_URL: amqp://cassio:MinhaSenha123@rabbitmq:5672
      NODE_ENV: production
    networks:
      - billing-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    

  worker:
    image: billing-api:latest
    command: node dist/src/worker.js
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/billing_db
      RABBITMQ_URL: amqp://cassio:MinhaSenha123@rabbitmq:5672
      NODE_ENV: production
    networks:
      - billing-network
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
      
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - billing-network

networks:
  billing-network:
    driver: overlay

volumes:
  postgres_data:
  rabbitmq_data: