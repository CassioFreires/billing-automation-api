# nginx do frontend — serve o SPA estático e faz proxy de /api -> API.
# Usado pelo serviço `web` do docker-compose.free.yml.
# Coloque o build do front em ./frontend/dist (ex.: saída do Vite/CRA).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy das rotas da API para o container `api` (rede interna do compose)
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check da API (opcional, útil para o load balancer)
    location = /health {
        proxy_pass http://api:3000/health;
    }

    # Fallback de SPA (React/Vue/Angular): sempre devolve o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache básico de assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
